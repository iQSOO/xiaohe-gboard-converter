<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>中文控制面板测试器</title>
<style>
:root{color-scheme:dark;--bg:#07111f;--panel:#0d1d30;--panel2:#10253c;--line:#243f5d;--text:#eaf3ff;--muted:#8ea5bd;--blue:#2d8cff;--green:#2bc77d;--red:#dd4457;--yellow:#f0b342}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% 0,#153459 0,transparent 34%),var(--bg);font-family:system-ui,-apple-system,sans-serif;color:var(--text)}button,input{font:inherit}.app{max-width:1060px;margin:auto;padding:16px}.top{display:flex;align-items:center;gap:12px;margin:6px 0 16px}.logo{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(145deg,#27a4ff,#6444d8);font-weight:800}.top h1{font-size:20px;margin:0}.top p{margin:3px 0 0;color:var(--muted);font-size:12px}.status{margin-left:auto;border:1px solid var(--line);padding:8px 11px;border-radius:999px;font-size:11px;color:#6ee3a2}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:linear-gradient(180deg,rgba(18,40,65,.98),rgba(10,24,40,.98));border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 14px 35px #0007}.card h2{font-size:15px;margin:0 0 12px}.features{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.feature{min-height:92px;padding:11px;border-radius:14px;background:#10243a;border:1px solid #29445f;cursor:pointer}.feature.on{border-color:#2d8cff;box-shadow:inset 0 0 0 1px #2d8cff55;background:#122c48}.feature-head{display:flex;justify-content:space-between;align-items:center}.feature h3{font-size:13px;margin:9px 0 4px}.feature p{margin:0;color:var(--muted);font-size:10px;line-height:1.45}.switch{width:37px;height:21px;border-radius:30px;background:#42556b;position:relative}.switch:after{content:"";position:absolute;width:17px;height:17px;border-radius:50%;background:#dbe8f7;left:2px;top:2px;transition:.18s}.feature.on .switch{background:var(--blue)}.feature.on .switch:after{left:18px}.scene{height:310px;position:relative;overflow:hidden;border:1px solid #29445f;border-radius:16px;background:linear-gradient(#092241,#162b49 58%,#173a35 58%,#0a211f)}.moon{position:absolute;width:62px;height:62px;border-radius:50%;background:#fff4c4;right:28px;top:24px;box-shadow:0 0 38px #fff3b4aa}.mountain{position:absolute;left:-5%;bottom:37%;width:110%;height:42%;background:linear-gradient(145deg,transparent 48%,#162943 49% 65%,transparent 66%),linear-gradient(35deg,transparent 45%,#223b58 46% 63%,transparent 64%)}.avatar{position:absolute;width:34px;height:34px;border-radius:50% 50% 45% 45%;background:linear-gradient(#fff,#8dd8ff);transform:translate(-50%,-50%);left:50%;top:72%;transition:.15s;box-shadow:0 0 18px #76cfff}.avatar:after{content:"";position:absolute;width:42px;height:26px;background:linear-gradient(90deg,#ffbd77,#eb6c79);border-radius:50%;left:-4px;top:21px;z-index:-1}.hud{position:absolute;left:10px;top:10px;background:#071423cc;border:1px solid #315270;padding:8px 10px;border-radius:11px;font-size:10px}.bar{width:104px;height:7px;background:#263d50;border-radius:6px;margin-top:5px;overflow:hidden}.bar i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#2bd38a,#e7d74a)}.coords{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:#06121fcc;padding:6px 9px;border-radius:8px;font-size:10px}.pad{display:grid;grid-template-columns:repeat(3,46px);justify-content:center;gap:5px;margin-top:10px}.pad button{height:42px;border:1px solid #325577;background:#122a43;color:#dcebff;border-radius:12px}.pad button:active{transform:scale(.96)}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}.btn{border:1px solid #365779;background:#132b44;color:#eaf3ff;padding:10px 13px;border-radius:11px}.primary{background:#176ed2;border-color:#3c9bff}.green{background:#147145;border-color:#2abf79}.red{background:#762937;border-color:#c44559}.row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #203a55}.row:last-child{border:0}.grow{flex:1}.row strong{display:block;font-size:12px}.row small{color:var(--muted);font-size:10px}.value{min-width:38px;text-align:right;color:#66b9ff}input[type=range]{width:100%}.coord{display:grid;grid-template-columns:1fr 1fr auto;gap:7px;margin-top:10px}.field{min-width:0;background:#081725;border:1px solid #29445f;color:#fff;border-radius:10px;padding:10px}.overlay{padding:11px;border-radius:12px;background:#091927;border:1px dashed #365775;color:#8dd7ff;font-size:11px}.log{height:105px;overflow:auto;background:#06121f;border:1px solid #203b55;border-radius:12px;padding:8px;font:10px/1.55 monospace;color:#a8c5de}.log div+div{margin-top:2px}.wide{grid-column:1/-1}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:#eef6ff;color:#07111f;padding:10px 14px;border-radius:11px;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:760px){.grid{grid-template-columns:1fr}.features{grid-template-columns:repeat(2,1fr)}.wide{grid-column:auto}.scene{height:285px}}@media(max-width:390px){.features{grid-template-columns:1fr 1fr}.coord{grid-template-columns:1fr 1fr}.coord .btn{grid-column:1/-1}.app{padding:11px}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="logo">控</div><div><h1>中文功能控制测试器</h1><p>可安装功能版 1.1 · 独立测试引擎</p></div><div class="status">● 运行中</div></header>
<div class="grid">
<section class="card"><h2>功能控制</h2><div class="features">
<div class="feature" data-key="flight"><div class="feature-head"><b>🪽</b><i class="switch"></i></div><h3>飞行模式</h3><p>允许上下移动并改变高度。</p></div>
<div class="feature" data-key="energy"><div class="feature-head"><b>⚡</b><i class="switch"></i></div><h3>无限能量</h3><p>场景能量始终保持 100%。</p></div>
<div class="feature" data-key="speed"><div class="feature-head"><b>🏃</b><i class="switch"></i></div><h3>速度增强</h3><p>移动步长自动变为两倍。</p></div>
<div class="feature" data-key="trail"><div class="feature-head"><b>✨</b><i class="switch"></i></div><h3>轨迹特效</h3><p>角色移动时显示发光效果。</p></div>
<div class="feature" data-key="touch"><div class="feature-head"><b>👆</b><i class="switch"></i></div><h3>触控反馈</h3><p>显示中文操作状态提示。</p></div>
<div class="feature" data-key="lock"><div class="feature-head"><b>🔒</b><i class="switch"></i></div><h3>配置锁定</h3><p>阻止误清除当前本地配置。</p></div>
</div></section>
<section class="card"><h2>内置测试场景</h2><div class="scene"><div class="moon"></div><div class="mountain"></div><div class="hud">能量<div class="bar"><i id="energyBar"></i></div><div style="margin-top:6px">速度 <b id="speedText">1×</b></div></div><div class="avatar" id="avatar"></div><div class="coords" id="coords"></div></div><div class="pad"><button disabled></button><button data-move="up">▲</button><button disabled></button><button data-move="left">◀</button><button id="reset">●</button><button data-move="right">▶</button><button disabled></button><button data-move="down">▼</button><button disabled></button></div><div class="actions"><button class="btn primary" id="random">随机传送</button><button class="btn green" id="restore">恢复能量</button></div></section>
<section class="card"><h2>参数和坐标</h2><div class="row"><div class="grow"><strong>基础移动步长</strong><small>速度增强会在此基础上乘 2</small></div><span class="value" id="stepValue">4</span></div><input id="step" type="range" min="2" max="10" value="4"><div class="row"><div class="grow"><strong>每次移动能耗</strong><small>无限能量关闭时生效</small></div><span class="value" id="costValue">4</span></div><input id="cost" type="range" min="1" max="12" value="4"><div class="coord"><input class="field" id="tx" type="number" value="50" placeholder="X"><input class="field" id="ty" type="number" value="50" placeholder="Y"><button class="btn primary" id="teleport">传送到坐标</button></div><div class="actions"><button class="btn" id="save">保存配置</button><button class="btn red" id="clear">清除配置</button></div></section>
<section class="card"><h2>系统悬浮控制</h2><div class="overlay" id="overlayState">正在检查悬浮窗权限……</div><div class="actions"><button class="btn primary" id="permission">授权悬浮窗</button><button class="btn green" id="startOverlay">启动悬浮控制</button><button class="btn red" id="stopOverlay">停止悬浮控制</button><button class="btn" id="testBridge">测试原生通信</button></div></section>
<section class="card wide"><h2>运行日志</h2><div class="log" id="log"></div></section>
</div></div><div class="toast" id="toast"></div>
<script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const defaults={features:{flight:false,energy:false,speed:false,trail:true,touch:true,lock:false},x:50,y:72,energy:100,step:4,cost:4};
let state=JSON.parse(JSON.stringify(defaults));
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function toast(t){if(!state.features.touch)return;const e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>e.classList.remove('show'),1200)}
function log(t){const e=document.createElement('div');e.textContent=new Date().toLocaleTimeString()+'  '+t;$('#log').prepend(e)}
function persist(silent=true){localStorage.setItem('ui-simulator-state',JSON.stringify(state));if(!silent){toast('配置已保存');log('配置写入本机')}}
function render(){
 $$('.feature').forEach(e=>e.classList.toggle('on',!!state.features[e.dataset.key]));
 $('#avatar').style.left=state.x+'%';$('#avatar').style.top=state.y+'%';
 $('#avatar').style.filter=state.features.trail?'drop-shadow(0 0 13px #76cfff) drop-shadow(0 0 18px #8a67ff)':'none';
 $('#coords').textContent=`X ${state.x.toFixed(1)} · Y ${state.y.toFixed(1)}`;
 $('#energyBar').style.width=state.energy+'%';$('#speedText').textContent=state.features.speed?'2×':'1×';
 $('#step').value=state.step;$('#stepValue').textContent=state.step;$('#cost').value=state.cost;$('#costValue').textContent=state.cost;
}
function spend(){if(state.features.energy){state.energy=100;return true}if(state.energy<state.cost){toast('能量不足');log('移动失败：能量不足');return false}state.energy=clamp(state.energy-state.cost,0,100);return true}
function move(dir){if((dir==='up'||dir==='down')&&!state.features.flight){toast('请先开启飞行模式');log('上下移动被拒绝');return}if(!spend())return;const s=state.step*(state.features.speed?2:1);if(dir==='left')state.x-=s;if(dir==='right')state.x+=s;if(dir==='up')state.y-=s;if(dir==='down')state.y+=s;state.x=clamp(state.x,5,95);state.y=clamp(state.y,12,88);render();persist();log(`移动 ${dir} → ${state.x.toFixed(1)}, ${state.y.toFixed(1)}`)}
$$('.feature').forEach(e=>e.onclick=()=>{const k=e.dataset.key;state.features[k]=!state.features[k];if(k==='energy'&&state.features.energy)state.energy=100;render();persist();toast(e.querySelector('h3').textContent+(state.features[k]?'已开启':'已关闭'));log(`${k}=${state.features[k]}`)});
$$('[data-move]').forEach(e=>e.onclick=()=>move(e.dataset.move));
$('#reset').onclick=()=>{state.x=50;state.y=72;render();persist();toast('位置已重置');log('位置重置')};
$('#random').onclick=()=>{state.x=10+Math.random()*80;state.y=18+Math.random()*62;if(!state.features.energy)state.energy=clamp(state.energy-8,0,100);render();persist();toast('随机传送成功');log('随机传送完成')};
$('#restore').onclick=()=>{state.energy=100;render();toast('能量已恢复');log('能量恢复为 100%')};
$('#teleport').onclick=()=>{state.x=clamp(parseFloat($('#tx').value)||50,5,95);state.y=clamp(parseFloat($('#ty').value)||50,12,88);render();persist();toast('传送成功');log(`坐标传送 → ${state.x}, ${state.y}`)};
$('#step').oninput=e=>{state.step=+e.target.value;render()};$('#cost').oninput=e=>{state.cost=+e.target.value;render()};
$('#save').onclick=()=>persist(false);$('#clear').onclick=()=>{if(state.features.lock){toast('配置已锁定');log('清除操作被锁定');return}state=JSON.parse(JSON.stringify(defaults));localStorage.removeItem('ui-simulator-state');render();toast('配置已清除');log('恢复默认配置')};
function bridge(){return typeof AndroidBridge!=='undefined'}
function refreshOverlay(){let ok=false;try{ok=bridge()&&AndroidBridge.hasOverlayPermission()}catch(e){}const el=$('#overlayState');el.textContent=ok?'● 悬浮窗权限已开启，可启动悬浮控制':'● 尚未取得悬浮窗权限';el.style.color=ok?'#6ee3a2':'#f2c15e';return ok}
window.onOverlayPermissionResult=refreshOverlay;
$('#permission').onclick=()=>{if(!bridge()){toast('请在 APK 内测试');return}AndroidBridge.requestOverlayPermission();log('已打开悬浮窗授权页面')};
$('#startOverlay').onclick=()=>{if(!bridge()){toast('请在 APK 内测试');return}if(AndroidBridge.startOverlay()){toast('悬浮控制已启动');log('悬浮服务启动成功')}else{toast('请先授权悬浮窗');log('启动失败：缺少权限')}};
$('#stopOverlay').onclick=()=>{if(bridge())AndroidBridge.stopOverlay();toast('悬浮控制已停止');log('悬浮服务已停止')};
$('#testBridge').onclick=()=>{if(bridge()){AndroidBridge.toast('网页与 Android 原生通信正常');log('原生通信测试成功')}else{toast('浏览器预览无原生接口')}};
try{const saved=JSON.parse(localStorage.getItem('ui-simulator-state')||'null');if(saved){state=Object.assign(state,saved);state.features=Object.assign({},defaults.features,saved.features||{})}}catch(e){}
render();refreshOverlay();log('独立测试引擎初始化完成');setInterval(()=>{if(state.features.energy&&state.energy!==100){state.energy=100;render()}},500);
</script>
</body></html>
