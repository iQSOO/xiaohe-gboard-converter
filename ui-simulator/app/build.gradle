plugins {
    id 'com.android.application'
}

android {
    namespace 'com.iqsoo.uisimulator'
    compileSdk 35

    defaultConfig {
        applicationId 'com.iqsoo.uisimulator'
        minSdk 23
        targetSdk 28
        versionCode 2
        versionName '1.1-functional-test'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
