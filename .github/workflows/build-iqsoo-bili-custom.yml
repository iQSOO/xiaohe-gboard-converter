name: Build Bili-iQSOO APK

on:
  push:
    branches: [main]
    paths:
      - 'tools/patch_iqsoo_bili.py'
      - 'tools/patch_bili_iqsoo_perf_v101.py'
      - '.github/workflows/build-iqsoo-bili-custom.yml'
  pull_request:
    branches: [main]
    paths:
      - 'bili-iqsoo-build-trigger.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout patch repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone upstream BiliPai 9.8.6
        run: |
          git clone --depth 1 --branch 9.8.6 https://github.com/jay3-yy/BiliPai.git BiliPai
          cd BiliPai
          echo "UPSTREAM_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Apply Bili-iQSOO performance patch
        working-directory: BiliPai
        run: python3 ../tools/patch_iqsoo_bili.py

      - name: Build optimized APK
        working-directory: BiliPai
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx5g -Dfile.encoding=UTF-8
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Collect APK, source and verification data
        run: |
          mkdir -p output
          find BiliPai/app/build/outputs/apk/debug -type f -name '*.apk' -print -exec cp '{}' output/ \;
          test -n "$(find output -maxdepth 1 -name '*.apk' -print -quit)"
          cp BiliPai/LICENSE output/GPL-3.0-LICENSE.txt
          cp BiliPai/BILI_IQSOO_MODIFICATIONS.txt output/BILI_IQSOO_MODIFICATIONS.txt
          (cd BiliPai && zip -qr ../output/Bili-iQSOO-1.0.1-modified-source.zip . -x '.git/*' 'app/build/*' '.gradle/*' 'build/*')
          cd output
          sha256sum *.apk > SHA256SUMS.txt
          printf 'Upstream commit: %s\nBuild date: 2026-07-03\nBuild type: optimized debug-signed\nPackage: com.iqsoo.bili\nLicense: GNU GPLv3\n' "$UPSTREAM_COMMIT" > BUILD-INFO.txt
          ls -lh

      - name: Upload Bili-iQSOO artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bili-iQSOO-1.0.1-performance
          path: output/*
          if-no-files-found: error
          retention-days: 7
