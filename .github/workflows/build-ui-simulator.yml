name: Build Android Test App
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - working-directory: ui-simulator
        run: gradle --no-daemon :app:assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Chinese-UI-Simulator-APK
          path: ui-simulator/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
